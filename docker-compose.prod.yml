services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baires_torneos}
      POSTGRES_USER: ${POSTGRES_USER:-baires}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      TZ: America/Argentina/Buenos_Aires
      PGTZ: America/Argentina/Buenos_Aires
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baires} -d ${POSTGRES_DB:-baires_torneos}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      TZ: America/Argentina/Buenos_Aires
      DATABASE_URL: postgresql://${POSTGRES_USER:-baires}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-baires_torneos}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL}
      ADMIN_URL: ${ADMIN_URL:?set ADMIN_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?set ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: America/Argentina/Buenos_Aires
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_started

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      TZ: America/Argentina/Buenos_Aires
      BACKEND_API_URL: http://backend:4000/api
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  backend_uploads:
